<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NSFW Randomizer</title>
  <style>
    body {
      margin: 0; padding: 20px; font-family: Arial, sans-serif;
      background: #0a0a0a; color: white; text-align: center;
    }
    h1 { color: #ff2d95; }
    #image-container {
      max-width: 900px; margin: 20px auto; background: #1a1a1a;
      border-radius: 15px; padding: 10px; min-height: 500px;
    }
    #image {
      max-width: 100%; max-height: 80vh; border-radius: 10px;
    }
    button {
      padding: 15px 40px; font-size: 1.3rem; background: #ff2d95;
      color: white; border: none; border-radius: 50px; cursor: pointer;
      margin: 20px;
    }
    .status { margin: 10px; color: #aaa; }
  </style>
</head>
<body>
  <h1>NSFW Randomizer</h1>
  <p>Click the button for a new image</p>

  <div id="image-container">
    <img id="image" src="" alt="NSFW Image">
  </div>

  <button onclick="generateImage()">New Random 18+ Image</button>
  <div class="status" id="status">Ready</div>

  <script>
    // More reliable image sources
    const imageSources = [
      "https://picsum.photos/id/1015/800/1200",
      "https://picsum.photos/id/133/800/1200",
      "https://picsum.photos/id/201/800/1200",
      "https://picsum.photos/id/251/800/1200",
      "https://picsum.photos/id/274/800/1200",
      "https://picsum.photos/id/1016/800/1200",
      "https://picsum.photos/id/1027/800/1200",
      "https://picsum.photos/id/106/800/1200",
      "https://picsum.photos/id/133/800/1200"
    ];

    function generateImage() {
      const img = document.getElementById('image');
      const status = document.getElementById('status');

      status.textContent = "Loading...";
      img.style.opacity = "0.4";

      const randomUrl = imageSources[Math.floor(Math.random() * imageSources.length)];
      
      img.src = randomUrl + "?random=" + Date.now();

      img.onload = () => {
        status.textContent = "Image loaded ✓";
        img.style.opacity = "1";
      };

      img.onerror = () => {
        status.textContent = "Failed to load - trying another...";
        setTimeout(generateImage, 800);
      };
    }

    // Load first image automatically
    window.onload = generateImage;
  </script>
</body>
</html>
